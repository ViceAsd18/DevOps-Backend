name: CI/CD Tienda Perritos - Backend

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build imagen Backend y push a Docker Hub
      run: |
        # Eliminamos 'cd backend' porque el repo ya es el backend
        docker build -t ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest

    - name: Desplegar Backend vía SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Actualizar tienda-backend desde Docker Hub" \
          --parameters '{"commands":[
            "set -e",
            "docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}",
            "docker pull ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest",
            "docker stop tienda-backend || true",
            "docker rm tienda-backend || true",
            "docker run -d --name tienda-backend -p 3001:3001 ${{ secrets.DOCKER_USERNAME }}/tienda-backend:latest"
          ]}' \
          --output text